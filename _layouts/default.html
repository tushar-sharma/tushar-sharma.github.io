<!DOCTYPE html>
<html>
  <head>
<meta charset="utf-8"/>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

  <link rel="alternate" type="application/rss+xml" title="Randomwits RSS" href="/feed.xml">
    {% include head.html %}
    {% seo %}
    {% if page.book_notes == true %}
      {% if page.tags contains 'books' %}
        <link rel="stylesheet" href="{{ root_url }}/css/book-notes.css">
      {% endif %}
    {% endif %}
  </head>
  <body>
    <noscript>
    <h4 style="background: #ffacd; margin: 0; padding: 15px; text-align: center;">
    For a better experience on RandomWits, enable JavaScript in your browser.
    </h4>
    </noscript>

    <div class="wrapper">
      <header>
        {% include sidebar.html %}
      </header>
      <section{% if page.wide %} class="section-wide"{% endif %}>
        {{ content }}
      </section>
   </div>
   <div style="clear:both;"></div>

    <div class="wrapper">
      <footer>
        {% include footer.html %}
      </footer>
    </div>
    {% if page.book_notes == true %}
      {% if page.tags contains 'books' %}
        <script src="{{ root_url }}/js/book-notes.js"></script>
      {% endif %}
    {% endif %}
  </body>
</html>
