<nav class="pagination clear" style="padding-bottom:20px;">
  {% if page.previous.url %}
    <a class="prev-item" href="{{ page.previous.url }}" title="Previous Post: {{ page.previous.title }}">&larr; Previous</a>
  {% endif %}
  {% if page.next.url %}
    <a class="next-item" href="{{ page.next.url }}" title="Next Post: {{ page.next.title }}">Next &rarr;</a>
  {% endif %}
</nav>
